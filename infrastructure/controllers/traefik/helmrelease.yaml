apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 12h
  releaseName: traefik
  targetNamespace: traefik
  chart:
    spec:
      chart: traefik
      version: 35.0.1
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: traefik
  values:
    experimental:
      plugins:
        crowdsec-bouncer-traefik-plugin:
          moduleName: "github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin"
          version: "v1.4.5"

    deployment:
      additionalVolumes:
        - name: crowdsec-bouncer-key
          secret:
            secretName: crowdsec-bouncer-key
            items:
              - key: api-key
                path: api-key
      additionalContainers: []

    additionalVolumeMounts:
      - name: crowdsec-bouncer-key
        mountPath: /etc/crowdsec
        readOnly: true

    globalArguments:
      - "--global.checknewversion=false" # Disable version check
      - "--global.sendanonymoususage=false" # Disable anonymous usage statistics

    additionalArguments:
      - "--providers.kubernetescrd" # Enable Kubernetes CRD provider
      - "--providers.kubernetescrd.allowCrossNamespace=true"
      - "--log.level=INFO" # Set log level to INFO

    ports:
      web:
        redirections:
          entryPoint:
            to: websecure
            scheme: https
            permanent: true

    ingressRoute:
      dashboard:
        enabled: true
        entryPoints:
          - websecure
        routes:
          - match: Host(`traefik.local.ruizops.com`)
            kind: Rule
            services:
              - name: api@internal
                kind: TraefikService
        tls:
          secretName: traefik-tls

    rbac:
      enabled: true

    service:
      enabled: true
      type: LoadBalancer
      annotations: {}
      labels: {}
      loadBalancerIP: "10.0.10.200"
      externalIPs: []
      spec:
        externalTrafficPolicy: Local

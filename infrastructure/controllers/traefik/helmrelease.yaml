apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 12h
  releaseName: traefik
  targetNamespace: traefik
  chart:
    spec:
      chart: traefik
      version: 35.0.1
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: traefik
  values:
    experimental:
      plugins:
        crowdsec-bouncer-traefik-plugin:
          moduleName: "github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin"
          version: "v1.4.5"

    deployment:
      additionalVolumes:
        - name: crowdsec-bouncer-key
          secret:
            secretName: crowdsec-bouncer-key
            optional: true
            items:
              - key: api-key
                path: api-key
      additionalContainers: []

    additionalVolumeMounts:
      - name: crowdsec-bouncer-key
        mountPath: /etc/crowdsec
        readOnly: true

    globalArguments:
      - "--global.checknewversion=false" # Disable version check
      - "--global.sendanonymoususage=false" # Disable anonymous usage statistics

    additionalArguments:
      - "--providers.kubernetescrd" # Enable Kubernetes CRD provider
      - "--log.level=INFO" # Set log level to INFO
      # Traefik resolves the real client IP from X-Forwarded-For before the CrowdSec
      # plugin sees the request. Pod CIDR covers cloudflared pods; Cloudflare ranges
      # cover the edge IPs that cloudflared may include in X-Forwarded-For.
      - "--entryPoints.websecure.forwardedHeaders.trustedIPs=10.244.0.0/16,103.21.244.0/22,103.22.200.0/22,103.31.4.0/22,104.16.0.0/13,104.24.0.0/14,108.162.192.0/18,131.0.72.0/22,141.101.64.0/18,162.158.0.0/15,172.64.0.0/13,173.245.48.0/20,188.114.96.0/20,190.93.240.0/20,197.234.240.0/22,198.41.128.0/17"
      - "--entryPoints.web.forwardedHeaders.trustedIPs=10.244.0.0/16,103.21.244.0/22,103.22.200.0/22,103.31.4.0/22,104.16.0.0/13,104.24.0.0/14,108.162.192.0/18,131.0.72.0/22,141.101.64.0/18,162.158.0.0/15,172.64.0.0/13,173.245.48.0/20,188.114.96.0/20,190.93.240.0/20,197.234.240.0/22,198.41.128.0/17"

    ports:
      web:
        redirections:
          entryPoint:
            to: websecure
            scheme: https
            permanent: true

    ingressRoute:
      dashboard:
        enabled: true
        entryPoints:
          - websecure
        routes:
          - match: Host(`traefik.local.ruizops.com`)
            kind: Rule
            services:
              - name: api@internal
                kind: TraefikService
        tls:
          secretName: traefik-tls

    rbac:
      enabled: true

    service:
      enabled: true
      type: LoadBalancer
      annotations: {}
      labels: {}
      loadBalancerIP: "10.0.10.200"
      externalIPs: []
      spec:
        externalTrafficPolicy: Local

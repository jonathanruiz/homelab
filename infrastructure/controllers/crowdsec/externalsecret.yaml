apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: crowdsec-secrets
  namespace: crowdsec
spec:
  refreshInterval: 12h
  secretStoreRef:
    name: azure-keyvault
    kind: ClusterSecretStore
  target:
    name: crowdsec-secrets
    template:
      type: Opaque
      engineVersion: v2
      data:
        # Used by LAPI envFrom to pre-register the bouncer on startup
        BOUNCER_KEY_traefik-bouncer: "{{ .crowdsecBouncerApiKey }}"
        # Used by bouncer HelmRelease valuesFrom
        bouncer-api-key: "{{ .crowdsecBouncerApiKey }}"
  data:
    - secretKey: crowdsecBouncerApiKey
      remoteRef:
        key: crowdsec-bouncer-api-key

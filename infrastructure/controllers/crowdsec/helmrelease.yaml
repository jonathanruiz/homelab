apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: crowdsec
  namespace: crowdsec
spec:
  interval: 12h
  chart:
    spec:
      chart: crowdsec
      version: "0.23.0"
      sourceRef:
        kind: HelmRepository
        name: crowdsec
        namespace: crowdsec
      interval: 12h
  values:
    # Talos Linux uses containerd, not docker
    container_runtime: containerd

    lapi:
      replicas: 1
      # Load bouncer API key from secret so it is pre-registered on startup.
      # Secret is provisioned by infrastructure/configs/crowdsec/externalsecret.yaml.
      # On first deploy the secret may not exist yet — Flux will retry once it does.
      envFrom:
        - secretRef:
            name: crowdsec-secrets

      # Use emptyDir — SQLite on NFS causes lock contention under concurrent requests.
      # Decisions are ephemeral (re-synced from agents/hub on restart); bouncer key is
      # re-registered via BOUNCER_KEY_traefik_bouncer env var from crowdsec-secrets.
      persistentVolume:
        data:
          enabled: false
        config:
          enabled: false

    agent:
      # DaemonSet — one agent per node
      isDeployment: false

      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule

      # Mount /var/log from the host — pod logs are at /var/log/pods/ on Talos
      hostVarLog: true

      # Install collections for Traefik log parsing and base HTTP attack detection
      env:
        - name: COLLECTIONS
          value: "crowdsecurity/traefik crowdsecurity/base-http-scenarios"

      # Read logs from Traefik pods via the Kubernetes pod log source
      acquisition:
        - namespace: traefik
          podName: traefik-*
          program: traefik


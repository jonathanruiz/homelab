apiVersion: v1
kind: ConfigMap
metadata:
  name: garage-config
  namespace: garage
data:
  garage.toml: |
    metadata_dir = "/var/lib/garage/meta"
    data_dir = "/var/lib/garage/data"
    db_engine = "lmdb"

    replication_factor = 1

    rpc_secret_env = "GARAGE_RPC_SECRET"
    rpc_bind_addr = "0.0.0.0:3901"
    rpc_public_addr = "garage.garage.svc.cluster.local:3901"

    [s3_api]
    s3_region = "garage"
    api_bind_addr = "0.0.0.0:3900"
    root_domain = ".s3.garage.svc.cluster.local"

    [admin]
    api_bind_addr = "0.0.0.0:3903"
    admin_token_env = "GARAGE_ADMIN_TOKEN"

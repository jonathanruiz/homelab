apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: azure-keyvault
spec:
  provider:
    azurekv:
      authType: "ServicePrincipal"
      vaultUrl: "${akvUrl}"
      tenantId: "${tenantId}"
      authSecretRef:
        clientId:
          name: azure-secret-creds
          key: clientId
          namespace: external-secrets
        clientSecret:
          name: azure-secret-creds
          key: clientSecret
          namespace: external-secrets

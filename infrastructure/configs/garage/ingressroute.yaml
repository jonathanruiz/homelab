apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: garage
  namespace: garage
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`garage.local.ruizops.com`)
      kind: Rule
      services:
        - name: garage-s3
          namespace: garage
          port: 3900
  tls:
    secretName: garage-tls

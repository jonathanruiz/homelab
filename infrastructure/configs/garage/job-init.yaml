apiVersion: batch/v1
kind: Job
metadata:
  name: garage-init
  namespace: garage
spec:
  backoffLimit: 20
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: alpine:3.19
          command:
            - /bin/sh
            - -c
            - |
              apk add --no-cache curl jq > /dev/null 2>&1

              ADMIN="http://garage-admin.garage.svc.cluster.local:3903"
              AUTH="Authorization: Bearer ${ADMIN_TOKEN}"

              echo "Waiting for Garage admin API..."
              until curl -s -o /dev/null -H "$AUTH" "${ADMIN}/health"; do
                sleep 3
              done

              echo "Checking layout version..."
              STATUS=$(curl -sf -H "$AUTH" "${ADMIN}/v2/GetClusterStatus")
              LAYOUT_VERSION=$(echo "$STATUS" | jq -r '.layoutVersion')

              if [ "${LAYOUT_VERSION}" -gt 0 ]; then
                echo "Layout version ${LAYOUT_VERSION} already applied, nothing to do."
                exit 0
              fi

              NODE_ID=$(echo "$STATUS" | jq -r '.nodes[0].id')
              echo "Node ID: ${NODE_ID}"

              echo "Assigning layout..."
              curl -s -w "\nHTTP %{http_code}\n" -X POST \
                -H "$AUTH" \
                -H "Content-Type: application/json" \
                -d "[{\"nodeId\":\"${NODE_ID}\",\"zone\":\"homelab\",\"capacity\":53687091200,\"tags\":[],\"remove\":false}]" \
                "${ADMIN}/v2/UpdateClusterLayout"

              echo "Applying layout version 1..."
              curl -s -w "\nHTTP %{http_code}\n" -X POST \
                -H "$AUTH" \
                -H "Content-Type: application/json" \
                -d '{"version":1}' \
                "${ADMIN}/v2/ApplyClusterLayout"

              echo "Garage initialization complete!"
          env:
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: garage-secrets
                  key: admin-token

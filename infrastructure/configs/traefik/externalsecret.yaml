apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: crowdsec-bouncer-key
  namespace: traefik
spec:
  refreshInterval: 12h
  secretStoreRef:
    name: azure-keyvault
    kind: ClusterSecretStore
  target:
    name: crowdsec-bouncer-key
  data:
    - secretKey: api-key
      remoteRef:
        key: crowdsec-bouncer-api-key

apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster
  settings.yaml: |
    title: Homelab
  custom.css: ""
  custom.js: ""
  bookmarks.yaml: |
    - Monitoring:
        - Grafana:
            - abbr: GF
              href: https://grafana.local.ruizops.com
        - Checkmate:
            - abbr: CM
              href: https://checkmate.local.ruizops.com
    - Automation:
        - n8n:
            - abbr: N8
              href: https://n8n.local.ruizops.com
    - Infrastructure:
        - Traefik:
            - abbr: TR
              href: https://traefik.local.ruizops.com/dashboard/
        - Forgejo:
            - abbr: FJ
              href: https://forgejo.local.ruizops.com
        - Netbox:
            - abbr: NB
              href: https://netbox.local.ruizops.com
        - IT Tools:
            - abbr: IT
              href: https://it-tools.local.ruizops.com
        - Proxmox:
            - abbr: PX
              href: https://pve001.local.ruizops.com
        - Synology:
            - abbr: SY
              href: https://synology.local.ruizops.com
  services.yaml: ""
  widgets.yaml: |
    - search:
        provider: google
        target: _blank
  docker.yaml: ""
  proxmox.yaml: ""

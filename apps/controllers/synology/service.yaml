apiVersion: v1
kind: Service
metadata:
  name: synology-nas
  namespace: synology
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 5000
      targetPort: 5000
---
apiVersion: v1
kind: Endpoints
metadata:
  name: synology-nas
  namespace: synology
subsets:
  - addresses:
      - ip: 10.0.40.30
    ports:
      - name: http
        port: 5000

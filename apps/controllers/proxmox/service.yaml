apiVersion: v1
kind: Service
metadata:
  name: proxmox-pve
  namespace: proxmox
spec:
  type: ClusterIP
  ports:
    - name: https
      port: 8006
      targetPort: 8006
---
apiVersion: v1
kind: Endpoints
metadata:
  name: proxmox-pve
  namespace: proxmox
subsets:
  - addresses:
      - ip: 10.0.10.50
    ports:
      - name: https
        port: 8006
---
apiVersion: v1
kind: Service
metadata:
  name: proxmox-ssh
  namespace: proxmox
spec:
  type: ClusterIP
  ports:
    - name: ssh
      port: 22
      targetPort: 22
---
apiVersion: v1
kind: Endpoints
metadata:
  name: proxmox-ssh
  namespace: proxmox
subsets:
  - addresses:
      - ip: 10.0.10.50
    ports:
      - name: ssh
        port: 22

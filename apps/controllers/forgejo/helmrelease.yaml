apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo
  namespace: forgejo
spec:
  interval: 12h
  chart:
    spec:
      chart: forgejo
      version: "17.0.1"
      sourceRef:
        kind: HelmRepository
        name: forgejo
        namespace: forgejo
      interval: 12h
  values:
    gitea:
      admin:
        existingSecret: forgejo-admin-credentials
      config:
        server:
          DOMAIN: forgejo.ruizops.com
          ROOT_URL: https://forgejo.ruizops.com
          HTTP_PORT: 3000
        actions:
          ENABLED: "false"
        service:
          DISABLE_REGISTRATION: "true"

    persistence:
      enabled: true
      storageClass: nfs-client
      size: 10Gi
      accessModes:
        - ReadWriteOnce
      # helm.sh/resource-policy: keep is already the chart default

    ingress:
      enabled: false

    # Disable bundled redis-cluster and postgresql — using SQLite
    redis-cluster:
      enabled: false
    postgresql:
      enabled: false
    postgresql-ha:
      enabled: false

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: uptime-kuma-mysql
  namespace: uptime-kuma
spec:
  interval: 12h
  chart:
    spec:
      chart: mysql
      version: "14.0.3"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
      interval: 12h
  values:
    fullnameOverride: uptime-kuma-db

    auth:
      database: uptime_kuma
      username: uptime_kuma
      existingSecret: uptime-kuma-db-credentials
      secretKeys:
        adminPasswordKey: db-root-password
        userPasswordKey: db-password

    primary:
      persistence:
        enabled: true
        storageClass: nfs-client
        accessModes:
          - ReadWriteOnce

    volumePermissions:
      enabled: false

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: uptime-kuma-postgresql
  namespace: uptime-kuma
spec:
  interval: 12h
  chart:
    spec:
      chart: postgresql
      version: "16.*"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
      interval: 12h
  values:
    fullnameOverride: uptime-kuma-db

    auth:
      username: uptime_kuma
      database: uptime_kuma
      existingSecret: uptime-kuma-db-credentials
      secretKeys:
        adminPasswordKey: db-admin-password
        userPasswordKey: db-password

    primary:
      persistence:
        enabled: true
        storageClass: nfs-client
        accessModes:
          - ReadWriteOnce

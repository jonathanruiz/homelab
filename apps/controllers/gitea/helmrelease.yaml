apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitea
  namespace: gitea
spec:
  interval: 12h
  chart:
    spec:
      chart: gitea
      version: "12.5.3"
      sourceRef:
        kind: HelmRepository
        name: gitea
        namespace: gitea
      interval: 12h
  values:
    gitea:
      admin:
        existingSecret: gitea-admin-credentials
      config:
        database:
          DB_TYPE: sqlite3
        server:
          DOMAIN: gitea.local.ruizops.com
          ROOT_URL: https://gitea.local.ruizops.com
          HTTP_PORT: 3000
        actions:
          ENABLED: "false"

    persistence:
      enabled: true
      storageClass: nfs-client
      accessModes:
        - ReadWriteOnce

    # Disable bundled dependencies — using SQLite
    redis-cluster:
      enabled: false
    postgresql-ha:
      enabled: false
    postgresql:
      enabled: false

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: n8n
  namespace: n8n
spec:
  interval: 12h
  chart:
    spec:
      chart: n8n
      version: "1.16.39"
      sourceRef:
        kind: HelmRepository
        name: n8n
        namespace: n8n
      interval: 12h
  values:
    timezone: "America/Denver"

    existingEncryptionKeySecret: "n8n-secrets"

    webhook:
      mode: regular
      url: "https://n8n.local.ruizops.com"

    worker:
      mode: regular

    main:
      podSecurityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      persistence:
        enabled: true
        storageClass: nfs-client
        accessMode: ReadWriteOnce

    db:
      type: postgresdb

    postgresql:
      enabled: true
      auth:
        username: n8n
        database: n8n
        existingSecret: n8n-secrets
        secretKeys:
          adminPasswordKey: POSTGRES_PASSWORD
          userPasswordKey: POSTGRES_PASSWORD
      primary:
        persistence:
          enabled: true
          storageClass: nfs-database

    extraEnv:
      - name: DB_POSTGRESDB_PASSWORD
        valueFrom:
          secretKeyRef:
            name: n8n-secrets
            key: POSTGRES_PASSWORD
      - name: N8N_PROXY_HOPS
        value: "1"
      - name: N8N_RUNNERS_ENABLED
        value: ""

    ingress:
      enabled: false

    diagnostics:
      enabled: false

    versionNotifications:
      enabled: false

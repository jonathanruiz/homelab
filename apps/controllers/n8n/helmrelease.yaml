apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: n8n
  namespace: n8n
spec:
  interval: 12h
  chart:
    spec:
      chart: n8n
      version: "1.16.39"
      sourceRef:
        kind: HelmRepository
        name: n8n
        namespace: n8n
      interval: 12h
  values:
    timezone: "America/Denver"

    existingEncryptionKeySecret: "n8n-secrets"

    webhook:
      mode: regular
      url: "https://n8n.local.ruizops.com"

    worker:
      mode: regular

    podSecurityContext:
      fsGroup: 1000
      fsGroupChangePolicy: "OnRootMismatch"

    main:
      persistence:
        enabled: true
        storageClass: nfs-database
        accessMode: ReadWriteOnce
      extraEnvVars:
        N8N_PROXY_HOPS: "1"
        N8N_RUNNERS_ENABLED: ""
      extraSecretNamesForEnvFrom:
        - n8n-secrets

    db:
      type: postgresdb

    postgresql:
      enabled: true
      auth:
        username: n8n
        database: n8n
        existingSecret: n8n-secrets
        secretKeys:
          adminPasswordKey: POSTGRES_PASSWORD
          userPasswordKey: POSTGRES_PASSWORD
      primary:
        persistence:
          enabled: true
          storageClass: nfs-database

    ingress:
      enabled: false

    diagnostics:
      enabled: false

    versionNotifications:
      enabled: false

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: n8n
  namespace: n8n
spec:
  interval: 12h
  chart:
    spec:
      chart: n8n
      version: "2.0.1"
      sourceRef:
        kind: HelmRepository
        name: n8n
        namespace: n8n
      interval: 12h
  values:
    config:
      generic:
        timezone: "America/Denver"
      webhook:
        url: "https://n8n.local.ruizops.com"

    secret:
      existingSecret: n8n-secrets

    persistence:
      enabled: true
      storageClass: nfs-client
      accessModes:
        - ReadWriteOnce

    ingress:
      enabled: false

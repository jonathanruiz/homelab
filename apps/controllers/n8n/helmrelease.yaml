apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: n8n
  namespace: n8n
spec:
  interval: 12h
  chart:
    spec:
      chart: n8n
      version: "1.16.39"
      sourceRef:
        kind: HelmRepository
        name: n8n
        namespace: n8n
      interval: 12h
  values:
    timezone: "America/Denver"

    existingEncryptionKeySecret: "n8n-secrets"

    webhook:
      mode: regular
      url: "https://n8n.local.ruizops.com"

    worker:
      mode: regular

    main:
      persistence:
        enabled: true
        storageClass: nfs-client
        accessMode: ReadWriteOnce

    db:
      type: sqlite

    ingress:
      enabled: false

    diagnostics:
      enabled: false

    versionNotifications:
      enabled: false

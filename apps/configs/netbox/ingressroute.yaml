apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: netbox
  namespace: netbox
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`netbox.local.ruizops.com`)
      kind: Rule
      priority: 100
      services:
        - name: netbox
          namespace: netbox
          port: 80
  tls:
    secretName: netbox-tls

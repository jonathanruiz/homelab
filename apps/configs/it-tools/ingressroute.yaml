apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: it-tools
  namespace: it-tools
spec:
  entryPoints:
    - websecure
  routes:
    # Authentik outpost callback — must be handled by Authentik, not it-tools.
    # Higher priority so these paths are never intercepted by the ForwardAuth middleware.
    - match: Host(`it-tools.ruizops.com`) && PathPrefix(`/outpost.goauthentik.io/`)
      kind: Rule
      priority: 200
      middlewares:
        - name: crowdsec-bouncer
      services:
        - name: authentik-server
          namespace: authentik
          port: 80

    - match: Host(`it-tools.local.ruizops.com`) && PathPrefix(`/outpost.goauthentik.io/`)
      kind: Rule
      priority: 200
      middlewares:
        - name: crowdsec-bouncer
      services:
        - name: authentik-server
          namespace: authentik
          port: 80

    # Public route — full middleware chain (CrowdSec + security headers)
    - match: Host(`it-tools.ruizops.com`)
      kind: Rule
      priority: 100
      middlewares:
        - name: it-tools-chain
      services:
        - name: it-tools
          namespace: it-tools
          port: 80

    # Internal/Tailscale route — security headers still apply, CrowdSec still runs.
    # Priority is lower so the public route takes precedence if both match
    # (they won't in practice since hostnames differ, but explicit is better).
    - match: Host(`it-tools.local.ruizops.com`)
      kind: Rule
      priority: 90
      middlewares:
        - name: it-tools-chain
      services:
        - name: it-tools
          namespace: it-tools
          port: 80
  tls:
    secretName: it-tools-tls

apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: it-tools
  namespace: it-tools
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`it-tools.local.ruizops.com`) || Host(`it-tools.ruizops.com`)
      kind: Rule
      priority: 100
      middlewares:
        - name: crowdsec-bouncer
      services:
        - name: it-tools
          namespace: it-tools
          port: 80
  tls:
    secretName: it-tools-tls

apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: crowdsec-bouncer
  namespace: it-tools
spec:
  plugin:
    crowdsec-bouncer-traefik-plugin:
      enabled: true
      crowdsecMode: stream
      crowdsecLapiHost: crowdsec-service.crowdsec.svc.cluster.local:8080
      crowdsecLapiKeyFile: /etc/crowdsec/api-key
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: it-tools-security-headers
  namespace: it-tools
spec:
  headers:
    frameDeny: true
    contentTypeNosniff: true
    forceSTSHeader: true
    stsSeconds: 31536000
    stsIncludeSubdomains: true
    stsPreload: true
    referrerPolicy: "strict-origin-when-cross-origin"
    permissionsPolicy: "camera=(), microphone=(), geolocation=(), payment=()"
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: it-tools-forwardauth
  namespace: it-tools
spec:
  forwardAuth:
    address: http://authentik-server.authentik.svc.cluster.local/outpost.goauthentik.io/auth/traefik
    trustForwardHeader: true
    authResponseHeaders:
      - X-authentik-username
      - X-authentik-groups
      - X-authentik-email
      - X-authentik-name
      - X-authentik-uid
      - X-authentik-jwt
      - X-authentik-meta-jwks
      - X-authentik-meta-outpost
      - X-authentik-meta-provider
      - X-authentik-meta-app
      - X-authentik-meta-version
---
# Chain — CrowdSec blocks bad IPs, ForwardAuth enforces login, then security headers
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: it-tools-chain
  namespace: it-tools
spec:
  chain:
    middlewares:
      - name: crowdsec-bouncer
      - name: it-tools-forwardauth
      - name: it-tools-security-headers

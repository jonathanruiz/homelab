apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: authentik
  namespace: authentik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`authentik.local.ruizops.com`)
      kind: Rule
      priority: 100
      services:
        - name: authentik-server
          namespace: authentik
          port: 80
  tls:
    secretName: authentik-tls

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: uptime-kuma-db-credentials
  namespace: uptime-kuma
spec:
  refreshInterval: 12h
  secretStoreRef:
    name: azure-keyvault
    kind: ClusterSecretStore
  target:
    name: uptime-kuma-db-credentials
    template:
      type: Opaque
      engineVersion: v2
      data:
        db-admin-password: "{{ .uptimeKumaDbAdminPassword }}"
        db-password: "{{ .uptimeKumaDbPassword }}"
        db-username: "uptime_kuma"
  data:
    - secretKey: uptimeKumaDbAdminPassword
      remoteRef:
        key: uptime-kuma-db-admin-password
    - secretKey: uptimeKumaDbPassword
      remoteRef:
        key: uptime-kuma-db-password

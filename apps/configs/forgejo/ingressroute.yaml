apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: forgejo
  namespace: forgejo
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`forgejo.local.ruizops.com`) || Host(`forgejo.ruizops.com`)
      kind: Rule
      priority: 100
      middlewares:
        - name: crowdsec-bouncer
      services:
        - name: forgejo-http
          namespace: forgejo
          port: 3000
  tls:
    secretName: forgejo-tls

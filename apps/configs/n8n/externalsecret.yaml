apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: n8n-secrets
  namespace: n8n
spec:
  refreshInterval: 12h
  secretStoreRef:
    name: azure-keyvault
    kind: ClusterSecretStore
  target:
    name: n8n-secrets
    template:
      type: Opaque
      engineVersion: v2
      data:
        encryptionKey: "{{ .n8nEncryptionKey }}"
  data:
    - secretKey: n8nEncryptionKey
      remoteRef:
        key: n8n-encryption-key

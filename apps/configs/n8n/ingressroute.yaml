apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: n8n
  namespace: n8n
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`n8n.local.ruizops.com`)
      kind: Rule
      priority: 100
      middlewares:
        - name: crowdsec-bouncer
          namespace: crowdsec
      services:
        - name: n8n
          namespace: n8n
          port: 5678
  tls:
    secretName: n8n-tls

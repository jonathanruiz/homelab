apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: gitea
  namespace: gitea
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`gitea.local.ruizops.com`)
      kind: Rule
      priority: 100
      services:
        - name: gitea-http
          namespace: gitea
          port: 3000
  tls:
    secretName: gitea-tls

apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: garage-ui
  namespace: garage-ui
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`garage-ui.local.ruizops.com`)
      kind: Rule
      services:
        - name: garage-ui
          namespace: garage-ui
          port: 3909
  tls:
    secretName: garage-ui-tls

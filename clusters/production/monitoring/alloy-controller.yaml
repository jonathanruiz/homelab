apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: alloy-controller
  namespace: flux-system
spec:
  interval: 10m
  path: ./monitoring/controllers/alloy
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: monitoring
  dependsOn:
    - name: loki-controller

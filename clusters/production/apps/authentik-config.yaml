apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: authentik-config
  namespace: flux-system
spec:
  interval: 10m
  path: ./apps/configs/authentik
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: authentik
  dependsOn:
    - name: authentik-controller

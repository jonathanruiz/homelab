apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: forgejo-config
  namespace: flux-system
spec:
  interval: 10m
  path: ./apps/configs/forgejo
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: forgejo
  dependsOn:
    - name: forgejo-controller

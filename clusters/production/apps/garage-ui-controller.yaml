  name: garage-ui-controller
  namespace: flux-system
spec:
  interval: 10m
  path: ./apps/controllers/garage-ui
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: infrastructure-config
    - name: garage-controllers

apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: pve001
  namespace: flux-system
spec:
  interval: 10m
  path: ./apps/proxmox-hosts/base
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substitute:
      HOST_NAME: pve001
      HOST_IP: 10.0.10.50
  dependsOn:
    - name: infrastructure-config

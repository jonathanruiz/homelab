apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: uptime-kuma-config
  namespace: flux-system
spec:
  interval: 10m
  path: ./apps/configs/uptime-kuma
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: uptime-kuma
  dependsOn:
    - name: uptime-kuma-controller

apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: n8n-config
  namespace: flux-system
spec:
  interval: 10m
  path: ./apps/configs/n8n
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: n8n
  dependsOn:
    - name: n8n-controller

apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gitea-config
  namespace: flux-system
spec:
  interval: 10m
  path: ./apps/configs/gitea
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: gitea
  dependsOn:
    - name: gitea-controller

apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-crowdsec
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  crowdsec.json: |
    {
      "title": "CrowdSec",
      "uid": "crowdsec-homelab",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-3h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Active Bans",
          "gridPos": { "x": 0, "y": 0, "w": 4, "h": 4 },
          "options": {
            "colorMode": "background",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 10 }
                ]
              }
            }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus" },
              "expr": "sum(cs_active_decisions{origin=\"CAPI\"}) or vector(0)",
              "legendFormat": "Bans"
            }
          ]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Total Alerts",
          "gridPos": { "x": 4, "y": 0, "w": 4, "h": 4 },
          "options": {
            "colorMode": "background",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 5 },
                  { "color": "red", "value": 50 }
                ]
              }
            }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus" },
              "expr": "sum(cs_alerts) or vector(0)",
              "legendFormat": "Alerts"
            }
          ]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Bouncer Decisions (Allowed)",
          "gridPos": { "x": 8, "y": 0, "w": 4, "h": 4 },
          "options": {
            "colorMode": "value",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed", "fixedColor": "green" }
            }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus" },
              "expr": "sum(increase(cs_lapi_decisions_ok_total[1h])) or vector(0)",
              "legendFormat": "Allowed (1h)"
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Bouncer Decisions (Blocked)",
          "gridPos": { "x": 12, "y": 0, "w": 4, "h": 4 },
          "options": {
            "colorMode": "background",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              }
            }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus" },
              "expr": "sum(increase(cs_lapi_decisions_ko_total[1h])) or vector(0)",
              "legendFormat": "Blocked (1h)"
            }
          ]
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Active Agents",
          "gridPos": { "x": 16, "y": 0, "w": 4, "h": 4 },
          "options": {
            "colorMode": "value",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed", "fixedColor": "blue" }
            }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus" },
              "expr": "count(cs_info)",
              "legendFormat": "Agents"
            }
          ]
        },
        {
          "id": 6,
          "type": "stat",
          "title": "Bouncer Requests (1h)",
          "gridPos": { "x": 20, "y": 0, "w": 4, "h": 4 },
          "options": {
            "colorMode": "value",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed", "fixedColor": "purple" }
            }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus" },
              "expr": "sum(increase(cs_lapi_bouncer_requests_total[1h])) or vector(0)",
              "legendFormat": "Requests"
            }
          ]
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Bouncer Decisions Over Time",
          "gridPos": { "x": 0, "y": 4, "w": 12, "h": 8 },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "fieldConfig": {
            "defaults": { "custom": { "lineWidth": 2 } },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Blocked" },
                "properties": [{ "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } }]
              },
              {
                "matcher": { "id": "byName", "options": "Allowed" },
                "properties": [{ "id": "color", "value": { "mode": "fixed", "fixedColor": "green" } }]
              }
            ]
          },
          "targets": [
            {
              "datasource": { "type": "prometheus" },
              "expr": "sum(rate(cs_lapi_decisions_ok_total[5m]))",
              "legendFormat": "Allowed"
            },
            {
              "datasource": { "type": "prometheus" },
              "expr": "sum(rate(cs_lapi_decisions_ko_total[5m]))",
              "legendFormat": "Blocked"
            }
          ]
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Bouncer Requests Over Time",
          "gridPos": { "x": 12, "y": 4, "w": 12, "h": 8 },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus" },
              "expr": "sum by (bouncer) (rate(cs_lapi_bouncer_requests_total[5m]))",
              "legendFormat": "{{bouncer}}"
            }
          ]
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "Parser Hits per Agent",
          "gridPos": { "x": 0, "y": 12, "w": 12, "h": 8 },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus" },
              "expr": "sum by (instance) (rate(cs_parser_hits_total[5m]))",
              "legendFormat": "{{instance}}"
            }
          ]
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "Log Lines Processed (Filesource)",
          "gridPos": { "x": 12, "y": 12, "w": 12, "h": 8 },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus" },
              "expr": "sum by (source) (rate(cs_filesource_hits_total[5m]))",
              "legendFormat": "{{source}}"
            }
          ]
        },
        {
          "id": 11,
          "type": "timeseries",
          "title": "LAPI Machine Requests",
          "gridPos": { "x": 0, "y": 20, "w": 12, "h": 8 },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus" },
              "expr": "sum by (machine) (rate(cs_lapi_machine_requests_total[5m]))",
              "legendFormat": "{{machine}}"
            }
          ]
        },
        {
          "id": 12,
          "type": "timeseries",
          "title": "Node Hits (Scenarios)",
          "gridPos": { "x": 12, "y": 20, "w": 12, "h": 8 },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus" },
              "expr": "sum by (name) (rate(cs_node_hits_total[5m]))",
              "legendFormat": "{{name}}"
            }
          ]
        }
      ]
    }

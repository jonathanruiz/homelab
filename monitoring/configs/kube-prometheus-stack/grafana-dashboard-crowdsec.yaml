apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-crowdsec
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Security"
data:
  crowdsec.json: |
    {
      "title": "CrowdSec",
      "uid": "crowdsec-homelab",
      "schemaVersion": 38,
      "version": 2,
      "refresh": "30s",
      "time": { "from": "now-3h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "loki_ds",
            "type": "datasource",
            "pluginId": "loki",
            "query": "loki",
            "label": "Loki",
            "hide": 0,
            "current": {}
          },
          {
            "name": "prometheus_ds",
            "type": "datasource",
            "pluginId": "prometheus",
            "query": "prometheus",
            "label": "Prometheus",
            "hide": 0,
            "current": {}
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Active Bans",
          "gridPos": { "x": 0, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${prometheus_ds}" },
          "options": {
            "colorMode": "background",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 10 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "sum(cs_active_decisions) or vector(0)",
              "legendFormat": "Bans"
            }
          ]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Total Alerts",
          "gridPos": { "x": 4, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${prometheus_ds}" },
          "options": {
            "colorMode": "background",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 5 },
                  { "color": "red", "value": 50 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "sum(cs_alerts) or vector(0)",
              "legendFormat": "Alerts"
            }
          ]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Decisions Allowed (1h)",
          "gridPos": { "x": 8, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${prometheus_ds}" },
          "options": {
            "colorMode": "value",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed", "fixedColor": "green" }
            }
          },
          "targets": [
            {
              "expr": "sum(increase(cs_lapi_decisions_ok_total[1h])) or vector(0)",
              "legendFormat": "Allowed"
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Decisions Blocked (1h)",
          "gridPos": { "x": 12, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${prometheus_ds}" },
          "options": {
            "colorMode": "background",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "sum(increase(cs_lapi_decisions_ko_total[1h])) or vector(0)",
              "legendFormat": "Blocked"
            }
          ]
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Bouncer Requests (1h)",
          "gridPos": { "x": 16, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${prometheus_ds}" },
          "options": {
            "colorMode": "value",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed", "fixedColor": "purple" }
            }
          },
          "targets": [
            {
              "expr": "sum(increase(cs_lapi_bouncer_requests_total[1h])) or vector(0)",
              "legendFormat": "Requests"
            }
          ]
        },
        {
          "id": 6,
          "type": "stat",
          "title": "Active Agents",
          "gridPos": { "x": 20, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${prometheus_ds}" },
          "options": {
            "colorMode": "value",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed", "fixedColor": "blue" }
            }
          },
          "targets": [
            {
              "expr": "count(cs_info)",
              "legendFormat": "Agents"
            }
          ]
        },
        {
          "id": 7,
          "type": "row",
          "title": "Access Logs",
          "gridPos": { "x": 0, "y": 4, "w": 24, "h": 1 },
          "collapsed": false
        },
        {
          "id": 8,
          "type": "logs",
          "title": "CrowdSec — Blocked Requests",
          "description": "IPs blocked by CrowdSec decisions (bans and bouncer rejections)",
          "gridPos": { "x": 0, "y": 5, "w": 24, "h": 10 },
          "datasource": { "type": "loki", "uid": "${loki_ds}" },
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "expr": "{namespace=\"crowdsec\"} |= \"ban\"",
              "legendFormat": "",
              "maxLines": 200
            }
          ]
        },
        {
          "id": 9,
          "type": "logs",
          "title": "CrowdSec — All Decisions & Alerts",
          "description": "Full CrowdSec LAPI and agent decision log",
          "gridPos": { "x": 0, "y": 15, "w": 24, "h": 10 },
          "datasource": { "type": "loki", "uid": "${loki_ds}" },
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": true,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "expr": "{namespace=\"crowdsec\"} |~ \"decision|alert|ban|allow|bouncer\"",
              "legendFormat": "",
              "maxLines": 500
            }
          ]
        },
        {
          "id": 10,
          "type": "row",
          "title": "Metrics",
          "gridPos": { "x": 0, "y": 25, "w": 24, "h": 1 },
          "collapsed": false
        },
        {
          "id": 11,
          "type": "timeseries",
          "title": "Bouncer Decisions Over Time",
          "gridPos": { "x": 0, "y": 26, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${prometheus_ds}" },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "fieldConfig": {
            "defaults": { "custom": { "lineWidth": 2 } },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Blocked" },
                "properties": [{ "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } }]
              },
              {
                "matcher": { "id": "byName", "options": "Allowed" },
                "properties": [{ "id": "color", "value": { "mode": "fixed", "fixedColor": "green" } }]
              }
            ]
          },
          "targets": [
            {
              "expr": "sum(rate(cs_lapi_decisions_ok_total[5m]))",
              "legendFormat": "Allowed"
            },
            {
              "expr": "sum(rate(cs_lapi_decisions_ko_total[5m]))",
              "legendFormat": "Blocked"
            }
          ]
        },
        {
          "id": 12,
          "type": "timeseries",
          "title": "Bouncer Requests Over Time",
          "gridPos": { "x": 12, "y": 26, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${prometheus_ds}" },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "targets": [
            {
              "expr": "sum by (bouncer) (rate(cs_lapi_bouncer_requests_total[5m]))",
              "legendFormat": "{{bouncer}}"
            }
          ]
        },
        {
          "id": 13,
          "type": "timeseries",
          "title": "Log Lines Parsed per Agent",
          "gridPos": { "x": 0, "y": 34, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${prometheus_ds}" },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "targets": [
            {
              "expr": "sum by (instance) (rate(cs_parser_hits_total[5m]))",
              "legendFormat": "{{instance}}"
            }
          ]
        },
        {
          "id": 14,
          "type": "timeseries",
          "title": "Scenario Node Hits",
          "gridPos": { "x": 12, "y": 34, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${prometheus_ds}" },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "targets": [
            {
              "expr": "sum by (name) (rate(cs_node_hits_total[5m]))",
              "legendFormat": "{{name}}"
            }
          ]
        }
      ]
    }

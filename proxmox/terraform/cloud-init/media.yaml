#cloud-config
hostname: vmdkr001
fqdn: vmdkr001.local.ruizops.com
manage_etc_hosts: true

users:
  - name: deploy
    groups: [sudo, docker]
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_authorized_keys:
      - ${ssh_public_key}

package_update: true
package_upgrade: true
packages:
  - qemu-guest-agent
  - curl
  - ca-certificates
  - gnupg
  - nfs-common
  - htop

runcmd:
  - systemctl enable qemu-guest-agent
  - systemctl start qemu-guest-agent

timezone: ${timezone}
locale: en_US.UTF-8
